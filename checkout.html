<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FoodHub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        🍽️ FoodHub
                    </a>
                </div>
                <nav class="nav-menu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="account.html" class="nav-link">Account</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Checkout Content -->
    <main class="container">
        <div class="checkout-container reveal">
            <!-- Checkout Form -->
            <div class="checkout-form">
                <h2 class="section-title">Finalize Your Order</h2>

                <!-- Step 1: Delivery -->
                <div class="checkout-step">
                    <h3 style="margin-bottom: var(--space-md); display: flex; align-items: center; gap: 8px;">
                        <span
                            style="background: var(--primary); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;">1</span>
                        Delivery Address
                    </h3>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Complete Address</label>
                        <textarea id="address" rows="3" placeholder="123 Main St, Apartment 4B..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
                    </div>
                </div>

                <!-- Step 2: Payment -->
                <div class="checkout-step" style="margin-top: var(--space-xl);">
                    <h3 style="margin-bottom: var(--space-md); display: flex; align-items: center; gap: 8px;">
                        <span
                            style="background: var(--primary); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;">2</span>
                        Payment Option
                    </h3>
                    <div class="payment-options">
                        <input type="radio" name="payment" id="pay-upi" class="payment-radio" style="display:none;"
                            checked>
                        <label for="pay-upi" class="payment-option-label">
                            <span style="font-size: 1.5rem;">📱</span>
                            <div>
                                <b style="display: block; margin-bottom: 2px;">UPI</b>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Google Pay, PhonePe,
                                    Paytm</span>
                            </div>
                        </label>

                        <input type="radio" name="payment" id="pay-card" class="payment-radio" style="display:none;">
                        <label for="pay-card" class="payment-option-label">
                            <span style="font-size: 1.5rem;">💳</span>
                            <div>
                                <b style="display: block; margin-bottom: 2px;">Credit / Debit Card</b>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Visa, Mastercard,
                                    RuPay</span>
                            </div>
                        </label>

                        <input type="radio" name="payment" id="pay-cod" class="payment-radio" style="display:none;">
                        <label for="pay-cod" class="payment-option-label">
                            <span style="font-size: 1.5rem;">💵</span>
                            <div>
                                <b style="display: block; margin-bottom: 2px;">Cash on Delivery</b>
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Pay when your food
                                    arrives</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="order-summary" id="order-summary-container">
                <h3 style="margin-bottom: var(--space-lg);">Order Summary</h3>
                <div id="checkout-items-list" style="margin-bottom: var(--space-lg);">
                    <!-- Dynamic items will be injected here -->
                </div>
                <div
                    style="display:flex; justify-content:space-between; margin-bottom:var(--space-sm); font-size: 0.95rem; color: var(--text-muted);">
                    <span>Delivery Fee</span>
                    <span>₹40</span>
                </div>
                <div
                    style="display:flex; justify-content:space-between; margin-bottom:var(--space-md); font-size: 0.95rem; color: var(--success);">
                    <span>Discount</span>
                    <span>-₹50</span>
                </div>
                <hr style="border:0; border-top:1px solid var(--divider); margin: var(--space-md) 0;">
                <div
                    style="display:flex; justify-content:space-between; font-weight:800; font-size:1.3rem; margin-bottom: var(--space-xl);">
                    <span>Total Amount</span>
                    <span id="checkout-total">₹0</span>
                </div>

                <a href="tracking.html" style="text-decoration:none;">
                    <button class="checkout-btn" onclick="clearCart()">Place Order</button>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 FoodHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('foodhub_cart')) || [];
            const itemsList = document.getElementById('checkout-items-list');
            const totalDisplay = document.getElementById('checkout-total');

            let subtotal = 0;
            itemsList.innerHTML = '';

            if (cart.length === 0) {
                itemsList.innerHTML = '<p style="color: #686b78;">Your cart is empty!</p>';
                totalDisplay.innerText = '₹0';
                return;
            }

            cart.forEach(item => {
                subtotal += item.price;
                const itemDiv = document.createElement('div');
                itemDiv.style.display = 'flex';
                itemDiv.style.justifyContent = 'space-between';
                itemDiv.style.marginBottom = '10px';
                itemDiv.innerHTML = `
                    <span>${item.name} (x1)</span>
                    <span>₹${item.price}</span>
                `;
                itemsList.appendChild(itemDiv);
            });

            const finalTotal = subtotal + 40 - 50;
            totalDisplay.innerText = `₹${Math.max(0, finalTotal)}`;
        });

        function clearCart() {
            localStorage.removeItem('foodhub_cart');
        }
    </script>
</body>

</html>
